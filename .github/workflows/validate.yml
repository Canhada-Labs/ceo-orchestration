  # ===========================================================================
  # PLAN-020 Phase 0 item 6b — opus-4-7-profiler-smoke job
  # ---------------------------------------------------------------------------
  # Runs `.claude/scripts/profile-opus-4-7.py --smoke` on every push + PR.
  # Synthetic mode (no Anthropic API call); ≤30s budget.
  # Catches regressions in:
  #  - Gate-boot file presence (CLAUDE.md + PROTOCOL.md + team.md +
  #    frontend-team.md + ceo-orchestration SKILL.md)
  #  - PLAN-020 frontmatter `status: executing` discipline
  #  - CODEOWNERS Phase 0a globs presence
  # ===========================================================================
  opus-4-7-profiler-smoke:
    if: vars.CEO_SOTA_DISABLE != '1'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - name: Checkout
        # SHA-pinned: actions/checkout@v6.0.2 (matches sibling jobs)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup Python 3.11
        # SHA-pinned: actions/setup-python@v6.2.0 (matches sibling jobs)
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.11"

      - name: Run profile-opus-4-7.py --smoke
        run: |
          set -euo pipefail
          # 30s budget enforced by --budget-seconds; non-zero exit on overrun
          # E12-F3 fix: script now also exits non-zero if any check.passed=false
          python3 .claude/scripts/profile-opus-4-7.py --smoke --budget-seconds 30
          echo "✓ opus-4-7 profiler smoke green (all checks passed)"

      - name: Run profile-opus-4-7.py --hook-latency (p95/p99 gate)
        run: |
          set -euo pipefail
          # E12-F4 fix: first real latency gate in CI (was zero thresholds).
          # N=20 iterations (fast; ADR-071 N≥200 for percentile-stability;
          # N=20 is advisory-grade but still catches gross regressions like
          # the PLAN-120 WS-J 2.27x p99 regression from eager live-import).
          # Budget: p95<120ms / p99<160ms (PLAN-063 DIM-15 CI fallback +
          # generous margin over the measured 57-64ms CI baseline).
          # Advisory emitters are disabled so pure governance logic is measured.
          python3 .claude/scripts/profile-opus-4-7.py \
            --hook-latency \
            --latency-iterations 20 \
            --p95-ceiling-ms 120 \
            --p99-ceiling-ms 160
          echo "✓ hook latency p95/p99 within budget"

      - name: Run profile-opus-4-7.py --floor (sanity)
        run: |
          set -euo pipefail
          # ~2s; subprocess startup floor measurement
          python3 .claude/scripts/profile-opus-4-7.py --floor > /tmp/floor.json
          # Sanity assertion: p50 floor must be < 200ms (CI runners are slow
          # but not pathologically so). Fails CI if regression > 4x macOS.
          python3 - <<'PY'
          import json, sys
          with open('/tmp/floor.json') as f:
              d = json.load(f)
          p50_ms = d['subprocess_floor_ms']['p50']
          if p50_ms > 200:
              sys.exit(f"FAIL: subprocess floor p50={p50_ms}ms > 200ms (CI runner regression?)")
          print(f"✓ subprocess floor p50={p50_ms}ms (under 200ms sanity cap)")
          PY

  # ===========================================================================
  # PLAN-020 Phase 1 — hook-tests-dual-rail (CEO_NATIVE_SUBAGENTS=[0,1])
  # ---------------------------------------------------------------------------
  # Catches regressions in BOTH the legacy custom rail (when adopters opt
  # out via CEO_NATIVE_SUBAGENTS=0) AND the native-subagent rail (default).
  # Budget ≤90s extra wall-clock vs single-rail run (≥45s × 2 legs).
  # ===========================================================================
  hook-tests-dual-rail:
    if: vars.CEO_SOTA_DISABLE != '1'
    runs-on: Ceo
    timeout-minutes: 10
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        native_subagents: ["0", "1"]
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup Python 3.11
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.11"

      - name: Install pytest (dev dep, not shipped)
        run: python3 -m pip install --quiet --no-cache-dir "pytest==8.*" pytest-xdist

      - name: Run hook tests with CEO_NATIVE_SUBAGENTS=${{ matrix.native_subagents }}
        env:
          CEO_NATIVE_SUBAGENTS: ${{ matrix.native_subagents }}
        run: |
          set -euo pipefail
          echo "Running hook tests with CEO_NATIVE_SUBAGENTS=$CEO_NATIVE_SUBAGENTS"
          python3 -m pytest .claude/hooks/tests/ -n auto -m 'not serial' --strict-markers --tb=no -q
          python3 -m pytest .claude/hooks/tests/ -m 'serial' --strict-markers --tb=no -q
          echo "✓ Hook tests green for CEO_NATIVE_SUBAGENTS=$CEO_NATIVE_SUBAGENTS"

  # =========================================================================
  # PLAN-086 Wave G.2 — Python version matrix (M-7 fold)
  # =========================================================================
  hook-tests-python-matrix:
    if: vars.CEO_SOTA_DISABLE != '1'
    runs-on: Ceo
    timeout-minutes: 25
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install pytest + PyYAML (dev deps, not shipped)
        run: python3 -m pip install --quiet --no-cache-dir "pytest==8.*" "PyYAML>=6.0" pytest-xdist

      - name: Run hook + script tests on Python ${{ matrix.python-version }}
        env:
          PYTHONPATH: "."
        run: |
          set -euo pipefail
          echo "Python version: $(python3 --version)"
          python3 -m pytest .claude/hooks/tests/ .claude/scripts/tests/ .claude/scripts/optimizer/tests/ \
            -n auto -m 'not serial' --strict-markers --tb=no -q
          python3 -m pytest .claude/hooks/tests/ .claude/scripts/tests/ .claude/scripts/optimizer/tests/ \
            -m 'serial' --strict-markers --tb=no -q
          echo "Tests green on Python ${{ matrix.python-version }}"
