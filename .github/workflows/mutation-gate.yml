# PLAN-050 Phase 6 (C3 Path B) + PLAN-086 Wave G.1 + PLAN-112-FOLLOWUP-mutation-gate-perf
#
# **Status: ACTIVE (advisory weekly).** Canonical-guarded under
# `.github/workflows/*.yml` AND kernel-HARD-DENY; edits require an Owner GPG
# sentinel + CEO_KERNEL_OVERRIDE.
#
# Design (PLAN-112-FOLLOWUP-mutation-gate-perf — fits the 4-module scope into
# the CI budget without abandoning coverage):
# - Matrix-per-module: one parallel job per security-critical module, each
#   with its own 60-min budget (AC1). redact finishes in minutes; the slower
#   modules each get a full isolated budget instead of dividing one.
# - Per-module NARROWED runner: each leg's mutmut --runner uses a single-
#   module `-k` filter (still excluding `spool_drain` per v1.40.2), cutting
#   per-mutation test time ~4x (AC2).
# - collect-only fail-fast: a leg whose `-k` filter selects 0 tests FAILS
#   (a filter that exercises no test yields a meaningless kill-rate — AC2a).
# - `.mutmut-cache` persisted via actions/cache keyed on the module + its
#   test set, so incremental weekly runs only re-test changed inputs (AC3).
# - redact leg ENFORCES kill-rate >= 80% and HARD-FAILS on an unreported
#   rate (AC4). Slower legs emit partial-progress + ::warning, never fail.
# - A single aggregate summary table reports module | killed/total | rate% |
#   within-budget? | coverage full|partial (AC5).
# - Per-leg concurrency keyed on module + ref (legs never cancel each other,
#   no cross-branch cancellation — AC6).
# - 9-check security envelope preserved: SHA-pinned uses, contents:read,
#   no pull_request trigger so the fork-PR guard is N/A (AC7).

name: mutation-gate-advisory

on:
  schedule:
    # Weekly at 04:17 UTC Monday — off-hours, stable slot.
    - cron: "17 4 * * 1"
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  mutate:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    # AC6: per-module + per-ref concurrency so matrix legs never cancel each
    # other and runs on different branches do not cancel each other.
    concurrency:
      group: "${{ github.workflow }}-${{ matrix.module }}-${{ github.ref }}"
      cancel-in-progress: true
    strategy:
      fail-fast: false
      matrix:
        include:
          - module: redact
            mutate_path: redact.py
            hash_path: .claude/hooks/_lib/redact.py
            filter: redact
            enforce: "true"
          - module: audit_hmac
            mutate_path: audit_hmac.py
            hash_path: .claude/hooks/_lib/audit_hmac.py
            filter: hmac
            enforce: "false"
          - module: canonical_guard
            mutate_path: mcp/canonical_guard.py
            hash_path: .claude/hooks/_lib/mcp/canonical_guard.py
            filter: canonical_guard
            enforce: "false"
          - module: check_pair_rail
            mutate_path: ../check_pair_rail.py
            hash_path: .claude/hooks/check_pair_rail.py
            filter: pair_rail
            enforce: "false"
    steps:
      - name: checkout
        # SHA-pinned (PLAN-050 C12) — actions/checkout@v4.
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: setup python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: restore .mutmut-cache
        # AC3: SHA-pinned actions/cache@v4.2.0. Key bound to the mutated
        # module AND its test set (the -k-selected tests live under tests/;
        # conftest.py is in that tree), so a stale kill-rate is never served
        # after a module/test/fixture change.
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: .claude/hooks/_lib/.mutmut-cache
          key: mutation-${{ matrix.module }}-${{ hashFiles(matrix.hash_path, '.claude/hooks/tests/**') }}

      - name: install mutmut
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install "mutmut>=2.4,<3" pytest

      - name: AC2a — fail fast if the leg filter selects 0 tests
        run: |
          set +e
          python3 -m pytest .claude/hooks/tests/ -q --collect-only \
            -k "${{ matrix.filter }} and not spool_drain" >/dev/null 2>&1
          RC=$?
          set -e
          # pytest exit 5 == "no tests collected".
          if [ "$RC" -eq 5 ]; then
            echo "::error::leg '${{ matrix.module }}' filter '${{ matrix.filter }} and not spool_drain' collects 0 tests — kill-rate would be meaningless"
            exit 1
          fi

      - name: baseline test run (leg filter)
        run: |
          python3 -m pytest .claude/hooks/tests/ -q --no-header \
            -k "${{ matrix.filter }} and not spool_drain" \
            --junitxml=baseline-${{ matrix.module }}.xml

      - name: mutation run (single module, narrowed runner)
        run: |
          cd .claude/hooks/_lib
          set +e
          # Soft 50-min internal cap < the 60-min job cap so an over-budget
          # leg stops gracefully and still emits a partial-progress artifact
          # (AC4) instead of being killed by the job timeout.
          timeout 50m mutmut run \
            --paths-to-mutate "${{ matrix.mutate_path }}" \
            --runner "python3 -m pytest ../../../.claude/hooks/tests/ -q -k '${{ matrix.filter }} and not spool_drain' --no-header" \
            --no-progress
          RC=$?
          set -e
          if [ "$RC" -eq 124 ]; then
            echo "partial" > coverage.flag
          else
            echo "full" > coverage.flag
          fi
          mutmut results > mutation-results-${{ matrix.module }}.txt || true
          mutmut junitxml > mutation-junit-${{ matrix.module }}.xml || true

      - name: compute kill-rate + AC2b superset check + AC4 enforce + AC5 row
        env:
          MODULE: ${{ matrix.module }}
          ENFORCE: ${{ matrix.enforce }}
        run: |
          python3 - <<'PY'
          import os, re, sys
          from pathlib import Path
          mod = os.environ["MODULE"]
          enforce = os.environ.get("ENFORCE") == "true"
          base = Path(".claude/hooks/_lib")
          res = base / f"mutation-results-{mod}.txt"
          cov = (base / "coverage.flag").read_text().strip() if (base / "coverage.flag").exists() else "full"

          killed = survived = total = 0
          rate = None
          if res.exists():
              text = res.read_text()
              killed = sum(int(m) for m in re.findall(r"killed[:\s]+(\d+)", text, re.I))
              survived = sum(int(m) for m in re.findall(r"survived[:\s]+(\d+)", text, re.I))
              total = killed + survived
              if total:
                  rate = killed / total * 100.0

          coverage = "full" if cov == "full" else f"partial({killed + survived}/?)"
          within = "yes" if cov == "full" else "no"
          rate_s = f"{rate:.1f}%" if rate is not None else "n/a"

          # AC5 row (this job's summary; the aggregate job builds the single table).
          summ = os.environ.get("GITHUB_STEP_SUMMARY")
          if summ:
              with open(summ, "a") as fh:
                  fh.write(f"| {mod} | {killed}/{total} | {rate_s} | {within} | {coverage} |\n")

          # Machine-readable row for the aggregate job. MUST live next to the
          # other leg artifacts (the upload step globs `.claude/hooks/_lib/`).
          (base / f"leg-{mod}.row").write_text(
              f"{mod}|{killed}/{total}|{rate_s}|{within}|{coverage}\n", encoding="utf-8")

          # AC2b — superset-preserving proof for the redact leg: if a recorded
          # baseline kill-rate exists, the narrowed runner must reproduce it
          # within tolerance (a smaller slice that hides surviving mutants
          # would diverge). Until a baseline is recorded (first green AC9
          # dispatch), the >=80% floor below is the active gate.
          baseline_f = Path(".claude/plans/PLAN-050/baseline/redact-killrate-baseline.txt")
          if enforce and rate is not None and baseline_f.exists():
              try:
                  bl = float(baseline_f.read_text().strip())
                  if abs(rate - bl) > 5.0:
                      print(f"::error::redact leg kill-rate {rate:.1f}% diverges from "
                            f"recorded baseline {bl:.1f}% (>5pp) — narrowed -k may be unsound")
                      sys.exit(1)
              except ValueError:
                  pass

          # AC4 — redact (enforce) HARD-FAILS on unreported rate or below floor.
          if enforce:
              if cov != "full" or rate is None:
                  print(f"::error::redact leg did not report a kill-rate "
                        f"(coverage={cov}) — hard fail (AC4)")
                  sys.exit(1)
              if rate < 80.0:
                  print(f"::error::redact kill-rate {rate:.1f}% below the 80% floor "
                        f"(ADR-044 / PLAN-093 AC15)")
                  sys.exit(1)
              print(f"redact kill-rate {rate:.1f}% (>=80% floor OK)")
          else:
              if rate is None:
                  print(f"::warning::{mod} produced no kill-rate (coverage={cov}) — advisory")
              elif rate < 80.0:
                  print(f"::warning::{mod} kill-rate {rate:.1f}% below 80% (advisory)")
              else:
                  print(f"{mod} kill-rate {rate:.1f}% (advisory)")
          PY

      - name: redact artifact before upload
        if: always()
        run: |
          SRC=".claude/hooks/_lib/mutation-results-${{ matrix.module }}.txt"
          if [ -f "$SRC" ]; then
            python3 .claude/scripts/backup-audit.py --redact "$SRC" || true
          fi

      - name: upload leg artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        if: always()
        with:
          name: mutation-leg-${{ matrix.module }}-${{ github.run_id }}
          path: |
            .claude/hooks/_lib/mutation-results-${{ matrix.module }}.txt
            .claude/hooks/_lib/mutation-junit-${{ matrix.module }}.xml
            .claude/hooks/_lib/leg-${{ matrix.module }}.row
          retention-days: 30
          if-no-files-found: ignore

  aggregate:
    needs: mutate
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: download leg artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          pattern: mutation-leg-*-${{ github.run_id }}
          path: legs
          merge-multiple: true

      - name: build single summary table (AC5)
        run: |
          {
            echo "## mutation-gate-advisory — kill-rate summary"
            echo ""
            echo "| module | killed/total | rate% | within-budget? | coverage |"
            echo "|---|---|---|---|---|"
            for row in legs/leg-*.row; do
              [ -f "$row" ] && sed 's/|/ | /g; s/^/| /; s/$/ |/' "$row"
            done
            echo ""
            echo "_redact leg is enforcing (>=80% floor, ADR-044/PLAN-093 AC15); other legs advisory._"
            echo "_A module absent from the table timed out past the 60-min job cap (partial — see AC4)._"
          } >> "$GITHUB_STEP_SUMMARY"
