name: Formal Verification (TLC)

# PLAN-014 Phase B.6 — advisory-only TLC model checker for TLA+ specs.
# SHA-pinned Java + TLC toolchain per ADR-044 §Toolchain pin.

on:
  push:
    paths:
      - 'docs/formal-verification/**'
  workflow_dispatch:
  schedule:
    # Monday 16:00 UTC — weekly advisory run
    - cron: '0 16 * * 1'

permissions:
  contents: read

env:
  TLA_VERSION: "1.8.0"
  TLA_TOOLS_SHA256: "4c1d62e0f67c1d89f833619d7edad9d161e74a54b153f4f81dcef6043ea0d618"
  TLA_TOOLS_URL: "https://github.com/tlaplus/tlaplus/releases/download/v1.8.0/tla2tools.jar"

jobs:
  tlc-model-check:
    name: TLC Model Check
    runs-on: ubuntu-latest
    timeout-minutes: 60
    # Advisory-only: failures do not block merges in Sprint 14
    continue-on-error: true

    steps:
      - name: Checkout
        # PLAN-019 DevOps-P2-5 — SHA-pin alignment with 14 sibling workflows.
        # Prior pin was actions/checkout@v4.2.2 (11bd719); aligned to the
        # repo-wide v6.0.2 pin (de0fac2) used by validate.yml / release.yml
        # / adapter-live.yml / benchmarks.yml / coverage.yml / red-team.yml
        # / npm-publish.yml / otel-smoke.yml / perf-profile.yml /
        # translations-drift.yml / chaos.yml / shadow-ci.yml /
        # smoke-install.yml. One-at-a-time Dependabot bumps created drift;
        # this aligns before drift compounds.
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Setup Java 17 LTS
        uses: actions/setup-java@c5195efecf7bdfc987ee8bae7a71cb8b11521c00  # v4.7.1
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Check CEO_SOTA_DISABLE
        run: |
          if [ "${CEO_SOTA_DISABLE:-0}" = "1" ]; then
            echo "CEO_SOTA_DISABLE=1 — skipping formal verification"
            exit 0
          fi

      - name: Download + verify tla2tools.jar
        run: |
          mkdir -p /tmp/tla-cache
          JAR_PATH="/tmp/tla-cache/tla2tools-${TLA_VERSION}.jar"
          if [ ! -f "$JAR_PATH" ]; then
            curl -fsSL -o "$JAR_PATH" "$TLA_TOOLS_URL"
          fi
          echo "${TLA_TOOLS_SHA256}  ${JAR_PATH}" | sha256sum -c -
          echo "TLC_JAR=${JAR_PATH}" >> "$GITHUB_ENV"

      - name: TLC — breaker.tla
        run: |
          cd docs/formal-verification
          java -cp "$TLC_JAR" tlc2.TLC \
            -config breaker.cfg \
            -workers auto \
            -deadlock \
            breaker.tla 2>&1 | tee /tmp/tlc-breaker.log
        continue-on-error: true

      - name: TLC — plan-lifecycle.tla
        run: |
          cd docs/formal-verification
          java -cp "$TLC_JAR" tlc2.TLC \
            -config plan-lifecycle.cfg \
            -workers auto \
            -deadlock \
            plan-lifecycle.tla 2>&1 | tee /tmp/tlc-plan-lifecycle.log
        continue-on-error: true

      - name: TLC — debate-convergence.tla
        run: |
          cd docs/formal-verification
          java -cp "$TLC_JAR" tlc2.TLC \
            -config debate-convergence.cfg \
            -workers auto \
            -deadlock \
            debate-convergence.tla 2>&1 | tee /tmp/tlc-debate-convergence.log
        continue-on-error: true

      - name: Print TLC log hashes
        if: always()
        run: |
          echo "=== TLC log hashes ==="
          for log in /tmp/tlc-*.log; do
            if [ -f "$log" ]; then
              name=$(basename "$log" .log)
              hash=$(sha256sum "$log" | cut -d' ' -f1)
              echo "${name}: ${hash}"
            fi
          done

      - name: Upload TLC logs
        if: always()
        # PLAN-019 DevOps-P2-5 — SHA-pin alignment. Sibling workflows
        # (benchmarks.yml / chaos.yml / coverage.yml / otel-smoke.yml /
        # perf-profile.yml / red-team.yml / shadow-ci.yml) all pin v7.0.1
        # (043fb46). Aligning to avoid one-at-a-time Dependabot drift.
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: tlc-logs
          path: /tmp/tlc-*.log
          retention-days: 30
