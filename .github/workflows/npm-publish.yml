name: NPM Publish

# Sprint 5 Phase 4; registry auth migrated to npm **Trusted Publishing**
# (OIDC) by PLAN-158 Wave 1 (PLAN-152 §Deferred backlog-oidc successor).
# Publishes ceo-orchestration on tag push (`v*`): the npm CLI (>=11.5.1,
# upgraded in-job — Node 20 bundles npm 10.x, which cannot do the
# exchange) detects the GitHub Actions OIDC context (`id-token: write`)
# and exchanges the per-run JWT for a short-lived publish credential
# scoped to this repo + workflow + `production-npm` environment as
# registered in the npmjs.com trusted-publisher config (Owner console).
# The same JWT keeps feeding the Sigstore `--provenance` attestation.
# The long-lived NPM_TOKEN is NOT read by this workflow anymore and is
# REVOKED once the first OIDC GA publish succeeds (until then it exists
# solely as the rollback path:
# .claude/plans/PLAN-158/staged/wave1/rollback-oidc-to-token.patch +
# .claude/plans/PLAN-158/oidc-failure-playbook.md — tag runs pin the
# workflow to the tag's tree, so a failed GA publish means rollback +
# delete/re-tag; there is no workflow_dispatch here by design).
# Manual `npm publish` is not used. The workflow:
#   1. Verifies VERSION + npm/package.json version + tag are consistent
#   2. Asserts package.json has zero runtime dependencies
#   3. Checks the registry for the exact version (PLAN-153 Wave B item 5
#      `already_published` idempotency guard) — if already present, the
#      run succeeds as a no-op instead of failing on EPUBLISHCONFLICT
#   4. Publishes with --provenance (Sigstore-attested)
#
# PLAN-013 Phase 0 item 0.2 hardening (debate Round 1 consensus §C5
# CRITICAL, 2/5 agents — DevOps + Staff Backend):
#   - Skip RC tags entirely (`if: !contains(github.ref, '-rc.')`) —
#     pushing `v1.4.0-rc.1` MUST NOT trigger a public npm publish;
#     that would violate PLAN-013 anti-goal #3 ("NO NPM publish during
#     Sprint 13") and anti-goal #16 ("NO auto-publish from tag without
#     manual approval").
#   - GA tags (`v1.4.0`) gate through `environment: production-npm`,
#     which requires a manual approval step in GitHub's Environments
#     settings before the job runs. The manual approval is the
#     Owner-in-the-loop gate covering the Sprint 17 public-launch
#     go/no-go decision (private-first strategy per
#     `project_closure_strategy.md`).

on:
  push:
    tags:
      - "v*"

concurrency:
  group: npm-publish-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write   # required for OIDC trusted publishing + provenance

jobs:
  publish:
    # PLAN-013 Phase 0 item 0.2 — RC tag guard.
    # RC tags contain `-rc.` (e.g. `v1.4.0-rc.1`). Skip them entirely.
    # Only GA tags (`v1.4.0`) proceed, and those gate through the
    # `production-npm` environment (manual approval).
    # PLAN-153 Wave B item 5 (f): RC posture UNCHANGED — this exclusion
    # is load-bearing (PLAN-013 anti-goals #3/#16) and MUST survive any
    # future edit to this file; the draft `next` dist-tag idea was
    # DROPPED by ratified debate. Pinned by
    # .claude/scripts/tests/test_release_workflow_asserts.py.
    if: "!contains(github.ref, '-rc.')"
    runs-on: ubuntu-latest
    environment: production-npm
    timeout-minutes: 8
    steps:
      - name: Checkout tag
        # SHA-pinned (Sprint 7 Dependabot bump): actions/checkout@v6.0.2
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0

      - name: Setup Node 20
        # SHA-pinned: actions/setup-node@v4.1.0
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Upgrade npm CLI for Trusted Publishing (OIDC)
        # PLAN-158 W1 (debate, all 3 critics): Node 20 bundles npm 10.x,
        # which does NOT implement the trusted-publishing token exchange —
        # without this step the OIDC publish dies ENEEDAUTH at GA, and
        # there is no earlier proof point (RC tags skip this workflow
        # entirely). npm >=11.5.1 is the first trusted-publishing-GA CLI.
        run: |
          set -euo pipefail
          npm install -g npm@^11.5.1
          NPM_V="$(npm --version)"
          case "$NPM_V" in
            10.*|11.0.*|11.1.*|11.2.*|11.3.*|11.4.*|11.5.0)
              echo "::error::npm $NPM_V < 11.5.1 — trusted publishing unsupported"
              exit 1
              ;;
          esac
          echo "OK: npm $NPM_V (>=11.5.1, trusted-publishing capable)"

      - name: Verify VERSION matches tag
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          VERSION_FILE="$(tr -d '[:space:]' < VERSION)"
          EXPECTED="${TAG#v}"
          if [[ "$VERSION_FILE" != "$EXPECTED" ]]; then
            echo "::error::VERSION ($VERSION_FILE) does not match tag ($TAG → $EXPECTED)"
            exit 1
          fi
          echo "OK: VERSION=$VERSION_FILE matches tag=$TAG"

      - name: Verify npm/package.json version matches VERSION
        run: |
          set -euo pipefail
          PKG_VERSION=$(node -p "require('./npm/package.json').version")
          VERSION_FILE="$(tr -d '[:space:]' < VERSION)"
          if [[ "$PKG_VERSION" != "$VERSION_FILE" ]]; then
            echo "::error::npm/package.json version ($PKG_VERSION) does not match VERSION ($VERSION_FILE)"
            exit 1
          fi
          echo "OK: npm/package.json version=$PKG_VERSION matches VERSION"

      - name: Verify zero runtime dependencies
        run: |
          set -euo pipefail
          DEP_COUNT=$(node -p "Object.keys(require('./npm/package.json').dependencies || {}).length")
          if [[ "$DEP_COUNT" -ne 0 ]]; then
            echo "::error::ceo-orchestration must ship with 0 runtime dependencies (got $DEP_COUNT)"
            exit 1
          fi
          echo "OK: ceo-orchestration has zero runtime dependencies"

      - name: Stage bundle into npm/
        # The npm package needs the framework source tree relative to npm/.
        # Copy (don't symlink — npm pack walks symlinks unpredictably across hosts).
        # PLAN-152 tarball-01: SELECTIVE staging. The root .npmignore is INERT
        # (package.json "files" whitelist takes precedence in npm-packlist), so
        # exclusion must happen at stage time. Framework-internal artifacts
        # (test harness, fixture corpora, eval/, red-team corpus, numbered plan
        # trees, _lib/testing.py + _lib/test_isolation.py per the PLAN-120
        # contract install.sh already honors) must NOT ship. Kept deliberately:
        # .claude/plans/ schemas + README + examples/ (install.sh provisions
        # them) and .claude/policies/fixtures/ (install.sh PLAN-014 A.8 ships
        # the policy bundle including fixtures).
        run: |
          set -euo pipefail
          RSYNC_EXCLUDES=(
            --include='.claude/policies/fixtures/'
            --include='templates/oidc-proxy/tests/'
            --include='templates/oidc-proxy/tests/**'
            --exclude='**/tests/'
            --exclude='**/fixtures/'
            --exclude='.claude/scripts/red-team-corpus/'
            --exclude='.claude/eval/'
            --exclude='.claude/plans/PLAN-[0-9]*'
            --exclude='.claude/hooks/_lib/testing.py'
            --exclude='.claude/hooks/_lib/test_isolation.py'
            --exclude='__pycache__/'
            --exclude='*.pyc'
            --exclude='.pytest_cache/'
          )
          for src in scripts templates .claude SPEC VERSION LICENSE README.md PROTOCOL.md; do
            if [[ -e "$src" ]]; then
              rsync -a --delete --delete-excluded "${RSYNC_EXCLUDES[@]}" "$src" "npm/"
            fi
          done
          ls -la npm/

      - name: Syntax-check the shim
        run: node --check npm/bin/ceo-orch-init.js

      - name: Verify scripts/install.sh is present in staged bundle
        run: test -f npm/scripts/install.sh

      - name: Populate install.sh self-SHA trailer (P0-15, PLAN-045)
        # PLAN-045 F-15R2-01 / Session 41: install.sh ships with a
        # `# CEO-INSTALL-SHA256: PLACEHOLDER_RELEASE_FILL` trailer as its
        # last line. At publish time, compute sha256 of the script body
        # (all lines EXCEPT the last) and substitute the placeholder with
        # the real hex. The script's own self-verify logic reads the same
        # last-line pattern, so downstream adopters running
        # `bash install.sh ...` trigger a rc=5 fail-CLOSED if the script
        # is modified in transit.
        working-directory: npm
        run: |
          set -euo pipefail
          FILE="scripts/install.sh"
          TRAILER_LINE="$(tail -n 1 "$FILE")"
          if [ "$TRAILER_LINE" != "# CEO-INSTALL-SHA256: PLACEHOLDER_RELEASE_FILL" ]; then
            echo "::error::$FILE trailer not at expected placeholder state"
            echo "got: $TRAILER_LINE"
            exit 1
          fi
          # Compute sha of everything EXCEPT the last line.
          HASH=$(awk 'NR==FNR{n++; next} FNR < n' "$FILE" "$FILE" | sha256sum | awk '{print $1}')
          # In-place substitute ONLY the last line.
          awk -v hash="$HASH" '
            NR == FNR { total = NR; next }
            FNR == total { print "# CEO-INSTALL-SHA256: " hash; next }
            { print }
          ' "$FILE" "$FILE" > "$FILE.new"
          mv "$FILE.new" "$FILE"
          chmod +x "$FILE"
          # Smoke-verify: execute the self-verify branch by running
          # the script without args (hits _verify_self_sha, then usage).
          bash "$FILE" 2>&1 | head -3 || true
          echo "OK: install.sh trailer populated with sha256 $HASH"

      - name: Packlist gate (PLAN-152 tarball-02)
        # Last-line assert before publish: the would-be tarball must carry no
        # tests/ or fixtures/ dirs (except .claude/policies/fixtures/, shipped
        # by install.sh contract), no .claude/eval/, no red-team-corpus/, no
        # .claude/plans/PLAN-<N>* artifacts, no _lib/testing.py or
        # _lib/test_isolation.py. Fail-closed: a pack or JSON parse failure
        # fails the job (set -euo pipefail).
        working-directory: npm
        run: |
          set -euo pipefail
          npm pack --dry-run --json 2>/dev/null | python3 -c '
          import json, re, sys
          d = json.load(sys.stdin)
          o = d[0] if isinstance(d, list) else d
          paths = [f["path"] for f in o["files"]]
          pat = re.compile(r"(^|/)(tests|fixtures)(/|$)|(^|/)eval/|(^|/)red-team-corpus/|(^|/)plans/PLAN-[0-9]|(^|/)_lib/(testing|test_isolation)\.py$")
          allow = (".claude/policies/fixtures/", "templates/oidc-proxy/tests/")
          bad = [p for p in paths if pat.search(p) and not p.startswith(allow)]
          if bad:
              print("::error::tarball would ship %d framework-internal artifact(s):" % len(bad))
              print("\n".join(bad[:40]))
              sys.exit(1)
          print("OK: packlist clean — %d files" % len(paths))
          '

      # -----------------------------------------------------------------
      # PLAN-153 Wave B item 5 (a) — `already_published` idempotency
      # guard. Before publishing, ask the registry whether this exact
      # name@version already exists. If it does (a re-run of a
      # previously successful publish, or a re-run after a post-publish
      # step failed), the Publish step is skipped and the job succeeds
      # as a documented no-op instead of going red on EPUBLISHCONFLICT.
      #
      # Detection is deliberately conservative: "published" ONLY when
      # `npm view <name>@<version> version` exits 0 AND prints exactly
      # the version (npm has historically flip-flopped between
      # rc!=0/E404 and rc=0/empty-stdout for a missing version of an
      # existing package — both shapes are treated as not-published).
      # Any registry/network error therefore falls through to the
      # publish attempt, which preserves today's behavior (npm itself
      # fails closed on a true conflict). No auth needed: the package
      # is public and `npm view` is an unauthenticated read.
      # -----------------------------------------------------------------
      - name: Check registry for already-published version
        id: already_published
        working-directory: npm
        run: |
          set -euo pipefail
          PKG_NAME=$(node -p "require('./package.json').name")
          PKG_VERSION=$(node -p "require('./package.json').version")
          set +e
          SEEN=$(npm view "${PKG_NAME}@${PKG_VERSION}" version 2>/dev/null)
          RC=$?
          set -e
          if [[ "$RC" -eq 0 && "$SEEN" == "$PKG_VERSION" ]]; then
            echo "published=true" >> "$GITHUB_OUTPUT"
            echo "::notice::${PKG_NAME}@${PKG_VERSION} already exists in the registry — publish will be skipped (idempotent re-run, succeed-as-noop)"
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
            echo "OK: ${PKG_NAME}@${PKG_VERSION} not in registry (rc=$RC) — proceeding to publish"
          fi

      - name: Publish (Trusted Publishing — OIDC)
        if: steps.already_published.outputs.published != 'true'
        working-directory: npm
        # PLAN-158 W1: NO long-lived token — npm >=11.5.1 detects the
        # GitHub Actions OIDC context and mints a short-lived credential
        # against the npmjs trusted-publisher registration (repo
        # Canhada-Labs/ceo-orchestration, workflow npm-publish.yml,
        # environment production-npm). --provenance keeps working (same
        # OIDC JWT feeds Sigstore).
        #
        # ROLLBACK (token fallback) — kept dormant BY DESIGN, do not
        # inline-enable: apply
        # .claude/plans/PLAN-158/staged/wave1/rollback-oidc-to-token.patch
        # (restores the `env: NODE_AUTH_TOKEN` block below), regenerate a
        # granular NPM_TOKEN in the Owner console, then delete + re-tag
        # (tag runs pin the workflow to the tag's tree — a re-run of the
        # failed run would re-execute the OIDC tree). Full sequence:
        # .claude/plans/PLAN-158/oidc-failure-playbook.md
        run: npm publish --provenance --access public

      - name: Publish skipped — version already in registry (no-op success)
        if: steps.already_published.outputs.published == 'true'
        run: |
          echo "::notice::publish skipped — exact version already in the registry; this re-run is an idempotent no-op (PLAN-153 Wave B item 5)"
