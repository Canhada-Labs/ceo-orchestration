[pytest]
# Explicit testpaths — single source of truth for test collection.
# PLAN-063 DIM-06 P2c. Audit-v3 finding: doc claims of test count
# were derived from ad-hoc CLI invocations across multiple roots,
# producing drift. This pins the collection scope.
#
# REPORT-S225 E3-F2 (RESOLVED S228, PLAN-134 W1 item 7):
# .claude/hooks/_lib/tests (387 tests) + .claude/scripts/swarm/tests
# (196 tests) were passing but orphaned. Both are wired now, incl.
# _lib/tests/federation (81 tests, formerly quarantined via an
# addopts --ignore):
#
# 1. _lib/tests/federation/ wired: test_federation_server.py +
#    test_federation_attack_surface.py used to LEAK the flat name
#    `replay` in sys.modules (server.py's standalone flat-import
#    fallback requires it during load, incl. a LAZY `from replay
#    import verify_signature` at request time), shadowing the
#    .claude/scripts/replay package and breaking collection of
#    replay/tests. Fixed by SCOPING the flat names: registered only
#    while the module-level loads execute, restored right after, and
#    re-planted per-module via setUpModule/tearDownModule so the lazy
#    request-time import still resolves during those tests.
#
# 2. .claude/scripts/swarm/tests cross-suite interference ROOT-CAUSED +
#    FIXED (S228): test_loop_runner_gate_enforcement.py set
#    sys.modules["_lib"].audit_emit = <SimpleNamespace fake> (an
#    attribute on the _lib PACKAGE object) and never restored it —
#    mock.patch.dict only restores sys.modules["_lib.audit_emit"] — so
#    every later `from _lib import audit_emit` (e.g. replay-session.py)
#    bound the fake via the _handle_fromlist getattr path and replay's
#    fail-open try/except swallowed the emits. Fixed with a scoped
#    install/restore context manager (mirrors _FakeEmitContext in
#    test_loop_runner_circuit_breaker.py). swarm/tests is listed BEFORE
#    replay/tests so the historical polluter->victim ordering is
#    exercised on every run. Regression repro:
#      pytest .claude/scripts/swarm/tests/test_loop_runner_gate_enforcement.py \
#        ".claude/scripts/replay/tests/test_replay_session.py::TestReplayFunctional::test_15_dry_run_emits_replay_started_and_completed"
testpaths =
    .claude/hooks/tests
    .claude/hooks/_lib/tests
    .claude/scripts/tests
    .claude/scripts/optimizer/tests
    .claude/scripts/swarm/tests
    .claude/scripts/replay/tests
    tests/formal_verification
    .claude/scripts/tier_policy_cli/tests
    .claude/scripts/tournament/tests
    tests/integration
    tests/test_federation
    tests/chaos
    tests/forensic
    tests/load
    tests/synthetic
# Quiet collection by default; -q on CLI overrides.
# Add new test roots here when introducing them; do NOT rely on
# implicit `pytest .` collection.
# Recurrence-prevention for the PLAN-117 WS-D item-0 noise class: a
# re-created git worktree (transient Agent isolation:worktree checkout)
# carries its own stale `_lib/` on sys.path; if a `pytest .` override
# ever descends into one, `check_output_secrets.py` re-imports a stale
# `audit_emit` and the `unknown action` noise returns. testpaths already
# pins collection, so this is defense-in-depth. NOTE: pytest fnmatch's
# each directory BASENAME (not the path) and SETTING this key REPLACES
# the built-in defaults — so the built-ins are spelled out here verbatim
# and `worktrees` (matches .claude/worktrees + npm/.claude/worktrees) is
# appended. `.codex` mirror is already covered by the `.*` default.
# PLAN-119-FOLLOWUP WS-1 (R-PERF6): `npm` is appended too — the gitignored
# `npm/.claude/{hooks,scripts}` bundle mirrors the canonical tree (incl. their
# tests/), so a `pytest .` override descending there would (a) collect duplicate
# tests and (b) regrow `__pycache__`/`.pyc` cruft in the bundle. testpaths
# already pins collection; this is defense-in-depth.
norecursedirs = *.egg .* _darcs build CVS dist node_modules venv {arch} worktrees npm
# Custom markers — registered to be compatible with --strict-markers
# enforced by PLAN-107 v1.38.0 ceremony Phase B absolute-pass gate.
markers =
    advisory: advisory test that does not gate CI (perf microbenches, soft probes)
    allow_live_audit_dir: PLAN-119 WS-A escape hatch — opt a test OUT of the
        suite-wide audit-dir isolation assert (for the rare test that genuinely
        exercises the real audit-dir resolver). Zero uses at ship; a
        validate-governance.sh grep gate keeps it at zero; CODEOWNERS requires
        security-engineer review to add one.
    serial: test that must NOT run under xdist parallelism
        (perf / concurrency / shared-repo-state); run in a separate serial pass. S220.
