\* PLAN-050 Phase 7a (C4) — TLC config for swarm_coordinator.tla
\* Bounded model check sized to fit within 60s on ubuntu-latest:
\*   N=3 loops, MaxParallel=2, MaxIter=4, Budget=6

CONSTANTS
    N = 3
    MaxParallel = 2
    MaxIter = 4
    Budget = 6

SPECIFICATION Spec

\* Safety invariants — checked at every reachable state
INVARIANTS
    MaxParallelRespected
    IterCeilingRespected
    PerLoopTokenBound
    TotalConsumedBounded

\* Liveness properties — checked against fair executions
PROPERTIES
    NoDeadWorker
    ProgressGuaranteed
    KillSwitchHalts

\* Symmetry over loop identifiers — state-space reduction
SYMMETRY Permutations(1..3)

\* Deadlock detection is OK here: swarm reaches a fixed-point when every
\* loop is terminal; no deadlock flag means "stuck non-terminal state".
CHECK_DEADLOCK FALSE
