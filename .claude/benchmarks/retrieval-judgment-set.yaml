# retrieval-judgment-set.yaml — PLAN-011 Phase 2 (H4 gate)
#
# Validation log (most recent first):
#   2026-06-13 — H4 gate re-run (PLAN-134 W4 morning #2 staleness advisory):
#     recall@5 lexical 0.923 (36/39) >= static 0.641 (25/39) — PASS.
#     Benchmark healthy against the live repo (151 skills); re-validated to
#     clear the >14d last-touched staleness flag. Run via:
#     python3 -m pytest .claude/benchmarks/tests/test_retrieval_recall_gate.py
#
# Hand-crafted gold pairs mapping realistic task descriptions to the
# skill(s) that should appear in the top-K retrieval result.
#
# Schema:
#   version: <int>
#   pairs:
#     - task: "<description string>"
#       expected_top_k: [<skill-slug>, ...]  # ordered by relevance; any
#                                             # of these counted as hit
#       archetype_hint: <archetype slug>     # optional; used for boost
#
# Success metric: Recall@5
#   For each pair, the retrieval is a HIT if any skill in expected_top_k
#   appears in the top-5 of the lexical ranking.
#   Recall@5 = HITS / len(pairs).
#
# Gate (H4): lexical baseline recall@5 must equal or exceed the static
# SKILL-MAP baseline recall@5 on this same set. If lexical loses, the
# gate test SKIPs with a note directing Sprint 12 to enable real
# embeddings via CEO_REAL_EMBEDDINGS=1.

