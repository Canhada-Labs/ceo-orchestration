  - id: LLM-CTRL-006
    name: Audit emit with redaction pass before external sink
    category: CONTROL-llm06-llm10
    severity: NONE
    version: 1
    validated_by: 2026-04-19
    input:
      type: code
      language: python
      content: |
        from _lib.redact import redact_secrets

        def emit_audit(spawn_prompt: str):
            safe = redact_secrets(spawn_prompt)
            # Hash the full prompt for correlation; the raw body never
            # leaves the boundary.
            import hashlib
            correlation = hashlib.sha256(spawn_prompt.encode()).hexdigest()
            requests.post(
                "https://internal-observability.example.com/ingest",
                json={"prompt_redacted": safe, "prompt_sha256": correlation},
            )
    prompt_template: |
      Review this audit emit for OWASP LLM Top 10 (2024) issues.
      Consider LLM06 + LLM10.

      For each issue return: JSON.
    expected:
      must_not_flag_tags: ["secret-in-log", "prompt-leak", "llm06", "llm10", "ip-exfiltration"]
      control_rationale: |
        The redact_secrets pass runs before the external POST; the raw
        prompt is replaced by a SHA-256 correlation hash. Both LLM06
        (secret disclosure) and LLM10 (prompt IP leak) are mitigated.
