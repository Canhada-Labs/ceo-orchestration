# .claude/policies/secret-patterns-exchange.yaml
# Authored by PLAN-083 Wave -1.4 sub-agent (CEO-direct Opus)
# STAGED at .claude/plans/PLAN-083/staging/wave-minus-1/sub-1-4-secret-patterns/
# TARGET (Wave 2 sub-agent 2.7): .claude/policies/secret-patterns-exchange.yaml
#
# Purpose: enumerate API-key / secret patterns for 8 cryptocurrency exchange
# families + BIP-39 mnemonic + EVM private key + generic fallback. Consumed by
# `_lib/output_scan.py` (Wave 2 sub-agent 2.7 wires it in) to scan logs / audit /
# receipts BEFORE emission in trading-readonly profile.
#
# PLAN-083 §5.4 item 2.7 requires:
#   - secret scan from this YAML BEFORE logs/audit/receipts (Codex P0 broader scope)
#   - per-rule FPR ≤15% on ≥100 true-negative samples (AC5b)
#
# IMPORTANT FOR INTEGRATORS:
#   - All regexes are PCRE-ish, expected to be compiled by Python `re` (with re.ASCII)
#   - No nested quantifiers (no catastrophic backtracking)
#   - Most patterns include a `context_hint` regex (anchor + label) to reduce FPR
#     on raw hex / UUID strings that look-but-aren't keys
#   - When `context_hint` is present, scanner should ONLY emit a finding when
#     EITHER (a) the bare regex matches AND a context_hint matches anywhere in
#     a ±200-byte window OR (b) the `strict` flag is true (no context required)
#   - For BIP-39 + Bitstamp `customer_id` + generic-fallback the `context_hint`
#     is mandatory to keep FPR under 15%

version: 1
schema_version: 1
catalog_version: "0.1.0"

# Shared anchoring regex fragments (informational; integrator MAY inline or
# pre-compile). Used by `context_hint` references below.
fragments:
  exchange_key_label: '(?i)(?:api[_-]?key|access[_-]?key|api[_-]?secret|secret[_-]?key|passphrase|customer[_-]?id|trading[_-]?key)'
  exchange_brand_binance: '(?i)binance'
  exchange_brand_coinbase: '(?i)coinbase'
  exchange_brand_kraken: '(?i)kraken'
  exchange_brand_bitfinex: '(?i)bitfinex'
  exchange_brand_bybit: '(?i)bybit'
  exchange_brand_okx: '(?i)\bok(?:x|ex)\b'
  exchange_brand_kucoin: '(?i)kucoin'
  exchange_brand_bitstamp: '(?i)bitstamp'

patterns:

  # ------------------------------------------------------------------
  # 1. Binance — API key + secret (commonly 64 hex chars)
  # Public docs describe a 64-char alphanumeric token; many observed
  # samples in the wild are 64 hex. We ship two entries:
  #   - binance-key-hex (high confidence): strict 64 hex chars
  #   - binance-key-alnum (medium): 64 alphanumeric (broader)
  # ------------------------------------------------------------------
  - id: binance-api-key-hex
    family: binance
    regex: '\b[A-Fa-f0-9]{64}\b'
    description: 'Binance API key / secret (64 hex chars)'
    redaction_label: '[REDACTED:binance_key]'
    confidence: high
    fpr_target: 0.15
    context_hint: '(?i)binance|api[_-]?key|secret'
    require_context: true
    references:
      - 'https://www.binance.com/en/support/faq/360002502072'
    notes: 'Same shape as SHA-256 hex; require_context: true keeps FPR low.'

  - id: binance-api-key-alnum
    family: binance
    regex: '\b[A-Za-z0-9]{64}\b'
    description: 'Binance API key / secret (64 alphanumeric, broader)'
    redaction_label: '[REDACTED:binance_key]'
    confidence: medium
    fpr_target: 0.15
    context_hint: '(?i)binance'
    require_context: true
    references:
      - 'https://www.binance.com/en/support/faq/360002502072'
    notes: 'Broader than hex; only fires when "binance" appears nearby to bound FPR.'

  # ------------------------------------------------------------------
  # 2. Coinbase Pro / Advanced Trade — UUID key + base64 secret + passphrase
  # ------------------------------------------------------------------
  - id: coinbase-api-key-uuid
    family: coinbase
    regex: '\b[0-9a-f]{32}\b'
    description: 'Coinbase Pro API key (32 hex / UUID compressed)'
    redaction_label: '[REDACTED:coinbase_key]'
    confidence: medium
    fpr_target: 0.15
    context_hint: '(?i)coinbase|cb-access'
    require_context: true
    references:
      - 'https://docs.cloud.coinbase.com/exchange/docs/rest-auth'
    notes: 'Same shape as MD5; context_hint mandatory.'

  - id: coinbase-api-secret-b64
    family: coinbase
    regex: '\b[A-Za-z0-9+/]{84,90}={0,2}\b'
    description: 'Coinbase Pro API secret (~88 base64 chars; 64 raw bytes encoded)'
    redaction_label: '[REDACTED:coinbase_secret]'
    confidence: medium
    fpr_target: 0.15
    context_hint: '(?i)coinbase|cb-access-sign|api[_-]?secret'
    require_context: true
    references:
      - 'https://docs.cloud.coinbase.com/exchange/docs/rest-auth'
    notes: '88 base64 chars decode to 64 raw bytes (HMAC-SHA256 key).'

  - id: coinbase-passphrase
    family: coinbase
    regex: '(?i)(?:cb[_-]?access[_-]?passphrase|coinbase[_-]?passphrase)\s*[:=]\s*[''"]?([A-Za-z0-9_!@#$%^&*-]{8,64})[''"]?'
    description: 'Coinbase Pro passphrase (label-anchored; user-chosen)'
    redaction_label: '[REDACTED:coinbase_passphrase]'
    confidence: high
    fpr_target: 0.05
    context_hint: ''
    require_context: false
    references:
      - 'https://docs.cloud.coinbase.com/exchange/docs/rest-auth'
    notes: 'Label-anchored so FPR is very low.'

  # ------------------------------------------------------------------
  # 3. Kraken — 56-char base64 key + 88-char base64 secret
  # ------------------------------------------------------------------
  - id: kraken-api-key
    family: kraken
    regex: '\b[A-Za-z0-9+/]{56}\b'
    description: 'Kraken API key (56 base64 chars)'
    redaction_label: '[REDACTED:kraken_key]'
    confidence: medium
    fpr_target: 0.15
    context_hint: '(?i)kraken|api[_-]?key'
    require_context: true
    references:
      - 'https://docs.kraken.com/rest/'
    notes: 'Unpadded base64 (alphabet variant; +/ allowed).'

  - id: kraken-api-secret
    family: kraken
    regex: '\b[A-Za-z0-9+/]{86,88}={0,2}\b'
    description: 'Kraken API secret (~88 base64 chars; 64 raw bytes)'
    redaction_label: '[REDACTED:kraken_secret]'
    confidence: medium
    fpr_target: 0.15
    context_hint: '(?i)kraken|api[_-]?secret|private[_-]?key'
    require_context: true
    references:
      - 'https://docs.kraken.com/rest/'
    notes: 'Same shape as Coinbase secret; brand-anchored.'

  # ------------------------------------------------------------------
  # 4. Bitfinex — 43 alphanumeric key + 43 alphanumeric secret
  # ------------------------------------------------------------------
  - id: bitfinex-api-key
    family: bitfinex
    regex: '\b[A-Za-z0-9]{43}\b'
    description: 'Bitfinex API key (43 alphanumeric)'
    redaction_label: '[REDACTED:bitfinex_key]'
    confidence: medium
    fpr_target: 0.15
    context_hint: '(?i)bitfinex|bfx[_-]?api'
    require_context: true
    references:
      - 'https://docs.bitfinex.com/docs/rest-auth'
    notes: 'Common length 43; brand-anchored.'

  # ------------------------------------------------------------------
  # 6. Bybit — API key 18-24 alphanumeric + secret 36 alphanumeric
  # ------------------------------------------------------------------
  - id: bybit-api-key
    family: bybit
    regex: '\b[A-Za-z0-9]{18,24}\b'
    description: 'Bybit API key (18-24 alphanumeric)'
    redaction_label: '[REDACTED:bybit_key]'
    confidence: medium
    fpr_target: 0.15
    context_hint: '(?i)bybit|x-bapi-api-key'
    require_context: true
    references:
      - 'https://bybit-exchange.github.io/docs/v5/intro'
    notes: 'Length range 18-24 catches both v3 + v5 issuance shapes; brand-anchored.'

  - id: bybit-api-secret
    family: bybit
    regex: '\b[A-Za-z0-9]{36}\b'
    description: 'Bybit API secret (36 alphanumeric)'
    redaction_label: '[REDACTED:bybit_secret]'
    confidence: medium
    fpr_target: 0.15
    context_hint: '(?i)bybit|api[_-]?secret'
    require_context: true
    references:
      - 'https://bybit-exchange.github.io/docs/v5/intro'
    notes: 'Same shape as some UUIDs-without-dashes; brand-anchored.'

  # ------------------------------------------------------------------
  # 7. OKX — UUID key + 32 hex secret + passphrase
  # ------------------------------------------------------------------
  - id: okx-api-key-uuid
    family: okx
    regex: '\b[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}\b'
    description: 'OKX API key (UUID-v4 shape)'
    redaction_label: '[REDACTED:okx_key]'
    confidence: medium
    fpr_target: 0.15
    context_hint: '(?i)\bok(?:x|ex)\b|ok-access'
    require_context: true
    references:
      - 'https://www.okx.com/docs-v5/en/'
    notes: 'Brand-anchored to disambiguate from other UUID-shaped keys.'

  - id: okx-api-secret
    family: okx
    regex: '\b[A-F0-9]{32}\b'
    description: 'OKX API secret (32 uppercase hex)'
    redaction_label: '[REDACTED:okx_secret]'
    confidence: medium
    fpr_target: 0.15
    context_hint: '(?i)\bok(?:x|ex)\b|ok-access-sign|api[_-]?secret'
    require_context: true
    references:
      - 'https://www.okx.com/docs-v5/en/'
    notes: 'Same shape as MD5; brand-anchored.'

  - id: okx-passphrase
    family: okx
    regex: '(?i)(?:ok[_-]?access[_-]?passphrase|okx[_-]?passphrase)\s*[:=]\s*[''"]?([A-Za-z0-9_!@#$%^&*-]{8,64})[''"]?'
    description: 'OKX passphrase (label-anchored)'
    redaction_label: '[REDACTED:okx_passphrase]'
    confidence: high
    fpr_target: 0.05
    context_hint: ''
    require_context: false
    references:
      - 'https://www.okx.com/docs-v5/en/'
    notes: 'Label-anchored; user-chosen string.'

  # ------------------------------------------------------------------
  # 8. KuCoin — UUID key + UUID secret + passphrase
  # ------------------------------------------------------------------
  - id: kucoin-api-key-uuid
    family: kucoin
    regex: '\b[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}\b'
    description: 'KuCoin API key (UUID-v4 shape)'
    redaction_label: '[REDACTED:kucoin_key]'
    confidence: medium
    fpr_target: 0.15
    context_hint: '(?i)kucoin|kc-api'
    require_context: true
    references:
      - 'https://www.kucoin.com/docs/rest/api-overview'
    notes: 'Brand-anchored to disambiguate from OKX UUID shape.'

  - id: kucoin-api-secret-uuid
    family: kucoin
    regex: '\b[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}\b'
    description: 'KuCoin API secret (UUID-v4 shape, same as key)'
    redaction_label: '[REDACTED:kucoin_secret]'
    confidence: medium
    fpr_target: 0.15
    context_hint: '(?i)kucoin|kc-api-secret|api[_-]?secret'
    require_context: true
    references:
      - 'https://www.kucoin.com/docs/rest/api-overview'
    notes: 'Same shape as key; context_hint disambiguates by label.'

  - id: kucoin-passphrase
    family: kucoin
    regex: '(?i)(?:kc[_-]?api[_-]?passphrase|kucoin[_-]?passphrase)\s*[:=]\s*[''"]?([A-Za-z0-9_!@#$%^&*-]{7,64})[''"]?'
    description: 'KuCoin passphrase (label-anchored)'
    redaction_label: '[REDACTED:kucoin_passphrase]'
    confidence: high
    fpr_target: 0.05
    context_hint: ''
    require_context: false
    references:
      - 'https://www.kucoin.com/docs/rest/api-overview'
    notes: 'Label-anchored.'

  # ------------------------------------------------------------------
  # 9. Bitstamp — Customer ID (numeric) + API key (alphanumeric)
  # ------------------------------------------------------------------
  - id: bitstamp-customer-id
    family: bitstamp
    regex: '(?i)(?:bitstamp[_-]?)?customer[_-]?id\s*[:=]\s*[''"]?(\d{6,9})[''"]?'
    description: 'Bitstamp Customer ID (6-9 digits, label-anchored)'
    redaction_label: '[REDACTED:bitstamp_customer_id]'
    confidence: high
    fpr_target: 0.05
    context_hint: ''
    require_context: false
    references:
      - 'https://www.bitstamp.net/api/'
    notes: 'Label-anchored so the numeric does not match random numbers.'

  - id: bitstamp-api-key
    family: bitstamp
    regex: '\b[A-Za-z0-9]{32}\b'
    description: 'Bitstamp API key (32 alphanumeric)'
    redaction_label: '[REDACTED:bitstamp_key]'
    confidence: medium
    fpr_target: 0.15
    context_hint: '(?i)bitstamp|api[_-]?key'
    require_context: true
    references:
      - 'https://www.bitstamp.net/api/'
    notes: 'Same shape as some UUIDs-without-dashes; brand-anchored.'

  # ------------------------------------------------------------------
  # 10. BIP-39 mnemonic — 12-word or 24-word lowercase mnemonic
  # We do NOT inline the BIP-39 wordlist. We match the SHAPE only +
  # require_context to keep FPR sane (otherwise any 12-word lowercase
  # sentence in English text matches).
  # ------------------------------------------------------------------
  - id: bip39-mnemonic-12
    family: bip39
    regex: '\b(?:[a-z]{3,8} ){11}[a-z]{3,8}\b'
    description: 'BIP-39 12-word mnemonic shape (3-8 lowercase letters per word)'
    redaction_label: '[REDACTED:bip39_mnemonic]'
    confidence: low
    fpr_target: 0.15
    context_hint: '(?i)mnemonic|seed[_-]?phrase|recovery[_-]?phrase|wallet[_-]?backup|words?[_-]?phrase'
    require_context: true
    references:
      - 'https://github.com/bitcoin/bips/blob/master/bip-0039.mediawiki'
    notes: 'Shape-only; full wordlist validation deferred to Wave 2 sub-agent 2.7.'

  - id: bip39-mnemonic-24
    family: bip39
    regex: '\b(?:[a-z]{3,8} ){23}[a-z]{3,8}\b'
    description: 'BIP-39 24-word mnemonic shape (3-8 lowercase letters per word)'
    redaction_label: '[REDACTED:bip39_mnemonic]'
    confidence: low
    fpr_target: 0.15
    context_hint: '(?i)mnemonic|seed[_-]?phrase|recovery[_-]?phrase|wallet[_-]?backup|words?[_-]?phrase'
    require_context: true
    references:
      - 'https://github.com/bitcoin/bips/blob/master/bip-0039.mediawiki'
    notes: 'Shape-only; full wordlist validation deferred to Wave 2 sub-agent 2.7.'

  # ------------------------------------------------------------------
  # 11. EVM private key — 0x + 64 hex (strict)
  # ------------------------------------------------------------------
  - id: evm-private-key
    family: evm
    regex: '\b0x[0-9a-fA-F]{64}\b'
    description: 'EVM (Ethereum) private key (0x + 64 hex)'
    redaction_label: '[REDACTED:evm_private_key]'
    confidence: high
    fpr_target: 0.10
    context_hint: ''
    require_context: false
    references:
      - 'https://ethereum.org/en/developers/docs/accounts/'
    notes: 'Same shape as 32-byte hash hex; in trading-readonly context emit even without label.'

  # ------------------------------------------------------------------
  # 12. Generic fallback — env-var / config-file assignment
  # ------------------------------------------------------------------
  - id: generic-api-key-assignment
    family: generic
    regex: '(?i)(?:api[_-]?key|api[_-]?secret|access[_-]?key|secret[_-]?key|passphrase|trading[_-]?key)\s*[:=]\s*[''"]?([A-Za-z0-9+/=_-]{16,})[''"]?'
    description: 'Generic API-key / secret assignment (env-var or config-file shape)'
    redaction_label: '[REDACTED:generic_api_credential]'
    confidence: medium
    fpr_target: 0.15
    context_hint: ''
    require_context: false
    references: []
    notes: 'Label-anchored on left side; covers `API_KEY=...`, `api_secret: "..."`, etc.'
