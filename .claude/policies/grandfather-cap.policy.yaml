# .claude/policies/grandfather-cap.policy.yaml
# Authored by PLAN-080 Phase 1b — successor to .claude/skill-governance-grandfather.yaml
# Canonical-guarded via _CANONICAL_GUARDS `policies/*.yaml` glob
#
# This file declares the governance caps for grandfathered skills and domain
# bundles. It is the authoritative source for:
#
#   1. individual_skills — 5-slot cap for one-off skills outside domain bundles
#   2. domain_bundles — domain roster cap (Q4 default: 15; post-PLAN-157-W1 current: 28)
#   3. sunset_* — criteria for the check-reopen gate in `audit-query by-domain`
#
# To add/remove domains: open a PLAN, run the governance gate, then edit this
# file as part of the ceremony. The cap is Owner-gated (requires GPG ceremony).

individual_skills:
  cap: 5
  current: 5
  members:
    - pre-plan-brainstorm
    - terse-mode
    - advanced-evaluation
    - agent-evaluation
    - agentic-actions-auditor

domain_bundles:
  # cap: operational ceiling enforced by `test_squad_grandfather_cap.py`.
  # Phase 1 shipped with cap=22 reflecting post-Phase-0b state (sales+legal+devrel
  # dropped from grandfather = 25 - 3). Phase 4 lowers cap to 15 (target_cap)
  # after sunset trim of zero-traffic domains.
  # cap raised 25→32 (S262, 2026-07-09): PLAN-153 Wave D landed 8
  # imported skills-only squads (agents-meta architecture cpp data-ml
  # desktop dotnet golang jvm) — the externally-imported posture of
  # `community` (ADR-060).
  # cap lowered 32→28 (PLAN-157 W1 sunset): desktop + dotnet sunset,
  # architecture + agents-meta folded then sunset — trees deleted
  # git-history-only (OQ2), roster entries removed below. Per OQ3
  # (Owner-ratified) cap := current, so the cap drops with the trim.
  # NO headroom left on purpose: the next addition must again be a
  # conscious, Owner-gated decision.
  # Graduation path: /architect each remaining imported squad (personas +
  # pitfalls + task-chains + examples + >=3 skills), then remove it
  # from SQUAD_GRANDFATHER AND from members below, lowering current.
  # cap lowered 28→27 (PLAN-157 W2 graduation: jvm — full ADR-009
  # bundle landed, squad off the roster; OQ3 cap := current).
  # cap lowered 27→26 (PLAN-157 W2 graduation: cpp — full ADR-009
  # bundle landed, squad off the roster; OQ3 cap := current).
  cap: 26
  # target_cap: PLAN-080 §6 Q4 default — long-term target. Phase 4 lowers
  # `cap` toward `target_cap` via sunset trim.
  target_cap: 15
  # current: actual count of SQUAD_GRANDFATHER entries (32 post-PLAN-153
  # Wave D, minus 4 PLAN-157 W1 sunsets = 26).
  current: 26
  members:
    # see SQUAD_GRANDFATHER in validate-governance.sh (re-grep for the
    # line — the number drifts). 26 entries (24 legacy + 2 remaining
    # Wave D imports); trim toward ≤15 via Phase 4 sunset + Wave D
    # graduation. Set-equality with SQUAD_GRANDFATHER is enforced by
    # TestSquadGrandfatherSetEqualsPolicyMembers (PLAN-157 W0 rider).
    - fintech
    - community
    - devrel
    - marketing-global
    - paid-media
    - mobile
    - embedded
    - voice-ai
    - hospitality
    - retail
    - supply-chain
    - training-l-and-d
    - civil-engineering
    - academic-humanities
    - healthcare
    - hr
    - real-estate-finance
    - finance-accounting
    - i18n-business
    - business-support
    - project-management
    - saas-platforms
    - identity-systems
    - lgpd-heavy-saas
    # PLAN-153 Wave D imported squads still grandfathered (desktop, dotnet,
    # architecture, agents-meta removed by PLAN-157 W1 sunset; cpp, data-ml,
    # golang, jvm graduate in PLAN-157 W2/W3):
    - data-ml
    - golang

# ---------------------------------------------------------------------------
# Sunset / reopen gate configuration
# Used by `audit-query.py by-domain --check-reopen` (PLAN-080 Phase 1)
# ---------------------------------------------------------------------------

# Number of calendar days post-sunset during which a spawn triggers reopen alert
sunset_reopen_window_days: 14

# A spawn must have dispatch_archetype_hint matching the sunset domain slug
# to trigger the reopen gate (UNKNOWN bucket never triggers — M2-CDX-7)
sunset_reopen_requires_hint_match: true

# UNKNOWN bucket explicitly excluded from reopen check per M2-CDX-7
sunset_reopen_unknown_excluded: true

