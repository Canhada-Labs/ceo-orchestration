# .claude/policies/grandfather-cap.policy.yaml
# Authored by PLAN-080 Phase 1b — successor to .claude/skill-governance-grandfather.yaml
# Canonical-guarded via _CANONICAL_GUARDS `policies/*.yaml` glob
#
# This file declares the governance caps for grandfathered skills and domain
# bundles. It is the authoritative source for:
#
#   1. individual_skills — 5-slot cap for one-off skills outside domain bundles
#   2. domain_bundles — domain roster cap (Q4 default: 15; post-PLAN-074 current: 25)
#   3. sunset_* — criteria for the check-reopen gate in `audit-query by-domain`
#
# To add/remove domains: open a PLAN, run the governance gate, then edit this
# file as part of the ceremony. The cap is Owner-gated (requires GPG ceremony).

individual_skills:
  cap: 5
  current: 5
  members:
    - pre-plan-brainstorm
    - terse-mode
    - advanced-evaluation
    - agent-evaluation
    - agentic-actions-auditor

domain_bundles:
  # cap: operational ceiling enforced by `test_squad_grandfather_cap.py`.
  # Phase 1 ships with cap=22 reflecting post-Phase-0b state (sales+legal+devrel
  # dropped from grandfather = 25 - 3). Phase 4 lowers cap to 15 (target_cap)
  # after sunset trim of zero-traffic domains.
  # cap raised 25→32 (S262, 2026-07-09): PLAN-153 Wave D landed 8
  # imported skills-only squads (agents-meta architecture cpp data-ml
  # desktop dotnet golang jvm) — the externally-imported posture of
  # `community` (ADR-060). Raise executed under the Owner's S262
  # autonomous-run mandate; flagged for Owner ratification in the
  # wave-G wake-up README. NO headroom left on purpose: the next
  # addition must again be a conscious, Owner-gated decision.
  # Graduation path: /architect each imported squad (personas +
  # pitfalls + task-chains + examples + >=3 skills), then remove it
  # from SQUAD_GRANDFATHER AND from members below, lowering current.
  cap: 32
  # target_cap: PLAN-080 §6 Q4 default — long-term target. Phase 4 lowers
  # `cap` toward `target_cap` via sunset trim.
  target_cap: 15
  # current: actual count of SQUAD_GRANDFATHER entries (24 at Phase 1
  # ship + 8 PLAN-153 Wave D imports, S262).
  current: 32
  members:
    # see SQUAD_GRANDFATHER in validate-governance.sh:284
    # 32 entries (24 legacy + 8 Wave D imports); trim toward ≤15 via
    # Phase 4 sunset + Wave D graduation
    - fintech
    - community
    - devrel
    - marketing-global
    - paid-media
    - mobile
    - embedded
    - voice-ai
    - hospitality
    - retail
    - supply-chain
    - training-l-and-d
    - civil-engineering
    - academic-humanities
    - healthcare
    - hr
    - real-estate-finance
    - finance-accounting
    - i18n-business
    - business-support
    - project-management
    - saas-platforms
    - identity-systems
    - lgpd-heavy-saas
    # PLAN-153 Wave D imported squads (S262 2026-07-09 — see cap note):
    - agents-meta
    - architecture
    - cpp
    - data-ml
    - desktop
    - dotnet
    - golang
    - jvm

# ---------------------------------------------------------------------------
# Sunset / reopen gate configuration
# Used by `audit-query.py by-domain --check-reopen` (PLAN-080 Phase 1)
# ---------------------------------------------------------------------------

# Number of calendar days post-sunset during which a spawn triggers reopen alert
sunset_reopen_window_days: 14

# A spawn must have dispatch_archetype_hint matching the sunset domain slug
# to trigger the reopen gate (UNKNOWN bucket never triggers — M2-CDX-7)
sunset_reopen_requires_hint_match: true

# UNKNOWN bucket explicitly excluded from reopen check per M2-CDX-7
sunset_reopen_unknown_excluded: true

