# ---------------------------------------------------------------------
# Predicate type registry — referenced by disable_predicate_eval.py
# Each entry declares the typed-state-machine arm that implements it.
# Adding a new predicate type requires:
#   1. Add entry below
#   2. Implement evaluator arm in disable_predicate_eval.py
#   3. Add test fixture in tests/test_disable_predicate_eval.py
# ---------------------------------------------------------------------

predicate_types:

  duration_threshold:
    description: |
      Compares a duration metric (in minutes) against a numeric threshold.
      Evaluates true when the metric breaches the operator+value gate.
      Bounded tail-scan over audit-log: reads at most CEO_PAIR_RAIL_AUDIT_TAIL_N
      records (default 10000) ending at log tail.
    required_keys: [metric, operator, value, window_minutes]
    operators: [">", ">=", "<", "<=", "=="]

  numeric_threshold:
    description: |
      Compares a numeric metric against a numeric threshold. Same bounded
      tail-scan semantics as duration_threshold. Used for rates (fp_rate,
      disagreement_rate) and percentile latencies (latency_p95).
    required_keys: [metric, operator, value]
    optional_keys: [window_days, window_minutes]
    operators: [">", ">=", "<", "<=", "=="]

  boolean:
    description: |
      Compares a boolean-coerced metric against a fixed value (typically
      true/false or 0/1). Used for hard-fail gates (e.g. write_parity_breach
      when ANY breach observed).
    required_keys: [metric, operator, value]
    operators: [">", ">=", "<", "<=", "=="]

# ---------------------------------------------------------------------
# Metric registry — names recognized by disable_predicate_eval.py.
# Each metric maps to an audit-log query shape. Adding a new metric
# requires a corresponding query implementation in the evaluator.
# ---------------------------------------------------------------------

metrics:
  codex_outage_minutes:
    description: |
      Total minutes within the trailing window where Codex MCP was
      unavailable (timeouts + connection errors + spawn failures
      grouped). Sourced from `pair_rail_codex_unavailable` audit events.
    source_action: pair_rail_codex_unavailable
    aggregation: window_sum_minutes

  fp_rate_30d:
    description: |
      False-positive rate over trailing 30 days. Numerator: Case-B audit
      events labeled FP via `audit-query.py label` (Phase 6 deliverable).
      Denominator: total Case-B events. Phase 2 evaluator returns 0.0 if
      denominator < 5 (insufficient evidence — never disable on noise).
    source_action: pair_rail_case_emit
    aggregation: ratio_with_min_n
    min_denominator: 5

  disagreement_rate_30d:
    description: |
      Share of Case-E (divergent verdicts) over total cases A-E (excluding
      F=outage). Phase 2 returns 0.0 if denominator < 5.
    source_action: pair_rail_case_emit
    aggregation: ratio_with_min_n
    min_denominator: 5

  codex_latency_p95_s:
    description: |
      95th percentile wall_clock_s field over `dispatcher_route`
      events in the trailing window_minutes. Bounded by
      CEO_PAIR_RAIL_AUDIT_TAIL_N. Returns 0.0 if denominator < 10
      (insufficient samples).
    source_action: dispatcher_route
    aggregation: percentile_p95
    min_denominator: 10

  u7_rubric_gap_pp:
    description: |
      Same-LLM bias rubric gap in percentage points, sourced from
      Phase 4 promotion-gate emitted `pair_rail_promotion_emit` records.
      Returns 0.0 if no promotion gate has run yet.
    source_action: pair_rail_promotion_emit
    aggregation: latest_value
    field: rubric_gap_pp

  u2_breaches_count:
    description: |
      Count of `file_write_breaches` from `codex_writeguard_block` audit
      events in the trailing window. Hard-fail gate — any breach disables
      coder=codex routing for write-archetype types.
    source_action: codex_writeguard_block
    aggregation: window_count

# ---------------------------------------------------------------------
# Default values — applied when archetype omits an optional field.
# ---------------------------------------------------------------------

defaults:
  reviewer_sandbox: read-only
  fallback_provider: claude
  audit_tail_n: 10000  # CEO_PAIR_RAIL_AUDIT_TAIL_N override permitted
  evaluator_timeout_ms: 100  # disable_predicate_eval must return ≤100ms
