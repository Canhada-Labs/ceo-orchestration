    health_prereq:
      - u1_pass    # Codex CLI installed + version pin
      - u4_pass    # Egress redaction parity
      - u7_pass    # Same-LLM bias gap acceptable
      - u11_pass   # PostToolUse advisory semantics
    disable_predicates:
