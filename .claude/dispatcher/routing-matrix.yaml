# .claude/dispatcher/routing-matrix.yaml — PLAN-081 Phase 2 deliverable
#
# Pair-Rail capability matrix. Per archetype, declares:
#   - coder: which provider authors the work (claude or codex)
#   - reviewer: which provider reviews the work (codex or claude)
#   - coder_model: model floor for the coder (per ADR-052 / ADR-064)
#   - reviewer_sandbox: sandbox mode for the reviewer (read-only / workspace-write / danger-full)
#   - fallback_provider: which provider to fall back to if the pair-rail is disabled
#   - health_prereq: list of unknown-IDs from PLAN-075 SPIKE-VERDICT.md that
#                    must PASS for this archetype to route via the pair-rail.
#                    Phase 2 carries these as **advisory metadata** for Phase 4
#                    promotion-gate consumption — the runtime dispatcher
#                    (inject-agent-context.sh --pair-mode) does NOT evaluate
#                    health_prereq directly; that becomes the Phase 4
#                    promotion-gate role per spec.md §10. Codex iter 1 P1-3.
#   - disable_predicates: list of typed predicates that, when ANY evaluates true,
#                         disable the pair-rail for this archetype and fall back
#                         to single-LLM coder=fallback_provider
#
# Schema is validated by .claude/dispatcher/routing-matrix-loader.py at load
# time. Each disable_predicate is evaluated by
# .claude/dispatcher/disable_predicate_eval.py against a bounded tail-scan
# of audit-log.jsonl (default 10000 records, override via env var
# CEO_PAIR_RAIL_AUDIT_TAIL_N) — NEVER unbounded O(n) scan.
#
# Per PLAN-081 R1 consensus + spec.md §10:
#   - 8 archetypes mandatory L2+ per ADR-107 (Phase 3 ACCEPTED)
#   - VETO-floor archetypes (CR + Sec + IDX + IC + TDE) coder=claude, model=opus
#     per ADR-052 — NEVER downgrade to Codex coder until Phase 4 promotion
#     gate passes 15/15 with 2-pass-with-triage (per ADR-108 §Operational)
#   - Other archetypes (QA + PE + RF + DOC + TA) reviewer=codex with
#     sandbox=read-only per ADR-106
#
# threat-model T-4 (archetype-spoofing): mutation of this YAML to swap
# coder/reviewer assignments is mitigated by:
#   1. canonical-guard (.claude/dispatcher/*.yaml) — sentinel-gated edits
#   2. SHA-pin in routing-matrix-loader.py at load time (audit-emit on
#      digest mismatch via dispatcher_route action)
#   3. validate-governance.sh registry check
#
# Schema version (bump on breaking change):
schema_version: "1.0.0-rc.1"
plan: PLAN-081
phase: 2
adr_refs: [ADR-052, ADR-064, ADR-095, ADR-105, ADR-106, ADR-107, ADR-108, ADR-110]

# ---------------------------------------------------------------------
# Archetype routing entries — sorted alphabetically for stable diff
# ---------------------------------------------------------------------

