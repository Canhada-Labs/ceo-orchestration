# Synthetic skill catalog — 36 skills covering:
#   - 5 high-priority/high-risk anchors (security-and-auth class)
#   - 24 "dormant" domain bundle skills (NOT active for any of the 5 profiles
#     in the standard fixture) — used by the dormant-suppression test
#   - 5 inactive_but_retained=true skills (universal-suppress test)
#   - 2 duplicate-trigger arbitration scenarios
#   - 30+ active-eligible skills for cap-cascade tests
#
# Each row is fed by the test's `build_skill_tree` helper into
# `<tmpdir>/<path>/SKILL.md` with a valid 4-skill frontmatter.

version: 1
skills:
