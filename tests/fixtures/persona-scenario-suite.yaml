    B.14: SEMI   # architect skill auto-pull but estimate refinement requires manual review
    B.13: AUTO   # graceful-degradation emits are telemetry-invariant
    B.11: AUTO   # tier-policy Tier-S check fires every /ceo-boot
    B.12: AUTO   # model_routing.resolve() injects per-spawn
    B.2: AUTO    # thinking-budget per task-class via _lib/model_routing
    B.6: SEMI    # MCP server suggested; user one-confirm to invoke
    B.7: SEMI    # cookbook patterns surfaced on skill-author / plan-draft
    B.3: AUTO    # general -> specialized auto-promotion via check_agent_spawn
    B.4: SEMI    # Pair-Rail SHADOW+DRY_RUN advisory; Phase C deferred
    B.5: AUTO    # batch detected on >=10 spawn benchmarks
    B.8: MANUAL  # SEMI-12 SOTA research DEFERRED to PLAN-092

