# PLAN-088 W5.1 — 52-cell persona scenario suite fixture
# Per AC1-AC4 dual-mode verify-persona-coverage.py CI mode default.
#
# Cells closure plan (post-PLAN-088 ship; ADR-118 §2.1 thresholds):
#   vibecoder      >= 12/13 (target 92.3%)
#   junior_dev     >= 11/13 (target 84.6%)
#   skeptical_cto  >= 11/13 (target 84.6%)
#   team_member    >= 11/13 (target 84.6%)
#
# Each cell is labeled AUTO / SEMI / MANUAL (legacy MANUAL becomes
# AUTO/SEMI post-PLAN-088 wiring per automation-gap-roadmap.yaml).
#
# Schema (13-axis x 4-persona = 52 cells):
#   axes: [B.1 ... B.14] (subset of 13 active per canonical-13)
#   personas:
#     <persona>:
#       <axis>: AUTO | SEMI | MANUAL
#
# This fixture represents the TARGET STATE post-PLAN-088 ship; CI mode
# reads this to validate the verifier itself works. Live mode reads
# audit-log to compute the actual observed state.

axes:
  - B.1   # prompt caching (AUTO-01)
  - B.10  # TTFV first-run-wizard (AUTO-02)
  - B.14  # estimation calibrator (AUTO-03)
  - B.13  # graceful degradation (SEMI-13)
  - B.11  # tier-policy token efficiency (AUTO-04)
  - B.12  # multi-model routing (AUTO-05)
  - B.2   # extended thinking (AUTO-09)
  - B.6   # MCP routing (AUTO-06)
  - B.7   # cookbook patterns (SEMI-11)
  - B.3   # sub-agent dispatch general -> specialized (AUTO-10)
  - B.4   # Pair-Rail substantive (AUTO-07 SHADOW+DRY_RUN)
  - B.5   # batch / streaming (AUTO-08)
  - B.8   # SOTA research patterns (SEMI-12 — deferred to PLAN-092)

personas:
  vibecoder:
    # Post-PLAN-088 target: 12/13 AUTO+SEMI (B.8 SEMI-12 deferred = MANUAL)
